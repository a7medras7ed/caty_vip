<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>VIP Orbit System Mobile Optimized</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="space-scene">
        <div class="space-bg"></div>
        <div class="space-overlay"></div>

        <div class="stars stars-small" id="starsSmall"></div>
        <div class="stars stars-medium" id="starsMedium"></div>
        <div class="stars stars-large" id="starsLarge"></div>

        <div class="nebula-glow nebula-1"></div>
        <div class="nebula-glow nebula-2"></div>
        <div class="nebula-glow nebula-3"></div>

        <div class="shooting-stars" id="shootingStars"></div>

        <div class="system-stage">
            <div class="solar-light solar-light-outer"></div>
            <div class="solar-light solar-light-mid"></div>
            <div class="solar-light solar-light-core"></div>

            <div class="ring-system system-drift" id="ringSystem">
                <div class="orbit-ring" data-ring="1"></div>
                <div class="orbit-ring" data-ring="2"></div>
                <div class="orbit-ring" data-ring="3"></div>
                <div class="orbit-ring" data-ring="4"></div>
                <div class="orbit-ring" data-ring="5"></div>
                <div class="orbit-ring" data-ring="6"></div>
                <div class="orbit-ring" data-ring="7"></div>
            </div>

            <div class="sun-holder" aria-label="VIP Sun">
                <div class="sun-aura"></div>
                <img src="sun-vip.png" alt="VIP Sun" class="sun-image" />
            </div>

            <div class="planets-layer" id="planetsLayer">
                <div class="planet vip1" id="planet-vip1"><div class="planet-core"><img src="planet-vip1.png" alt="VIP1" /></div></div>
                <div class="planet vip2" id="planet-vip2"><div class="planet-core"><img src="planet-vip2.png" alt="VIP2" /></div></div>
                <div class="planet vip3" id="planet-vip3"><div class="planet-core"><img src="planet-vip3.png" alt="VIP3" /></div></div>
                <div class="planet vip4" id="planet-vip4"><div class="planet-core"><img src="planet-vip4.png" alt="VIP4" /></div></div>
                <div class="planet vip5" id="planet-vip5"><div class="planet-core"><img src="planet-vip5.png" alt="VIP5" /></div></div>
                <div class="planet vip6" id="planet-vip6"><div class="planet-core"><img src="planet-vip6.png" alt="VIP6" /></div></div>
                <div class="planet vip7" id="planet-vip7"><div class="planet-core"><img src="planet-vip7.png" alt="VIP7" /></div></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
